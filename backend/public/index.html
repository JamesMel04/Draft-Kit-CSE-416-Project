<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Kit Backend</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      }
      .container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }
      h1 {
        color: #333;
        margin: 0 0 10px 0;
      }
      p {
        color: #666;
        margin: 5px 0;
      }
      .status {
        display: inline-block;
        margin-top: 20px;
        padding: 8px 16px;
        background: #4CAF50;
        color: white;
        border-radius: 5px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Draft Kit Backend API</h1>
      <p>Service is running and healthy</p>
      <div class="status">✓ Online</div>
    </div>
  </body>
</html>
